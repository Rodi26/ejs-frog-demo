name: "Frogbot Scan Repository"
on:
  workflow_dispatch:
  schedule:
    # Once a day at 09:00 UTC (avoid same cron as gh-ejs-demo at 08:30 UTC — duplicate schedules look like a "loop").
    - cron: "0 9 * * *"
permissions:
  contents: write
  pull-requests: write
  security-events: write
  # Required when vars.IAP_USE_WIF is true (google-github-actions/auth OIDC).
  id-token: write
jobs:
  scan-repository:
    runs-on: ubuntu-latest
    env:
      # Default JF_URL; overridden via GITHUB_ENV when IAP local proxy is used. See docs/github-actions-jfrog-iap.md
      JF_URL: ${{ format('https://{0}/', vars.JF_HOST_CLI != '' && vars.JF_HOST_CLI || vars.JF_HOST) }}
      JF_PUBLIC_HOST: ${{ vars.JF_HOST }}
      JF_PUBLIC_URL: ${{ format('https://{0}/', vars.JF_HOST) }}
      JF_IAP_PROXY_PORT: "18081"
      JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
    strategy:
      matrix:
        # The repository scanning will be triggered periodically on the following branches.
        branch: [ "main" ]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      # Frogbot uses JF_URL like jf — no Proxy-Authorization; local forwarder adds IAP JWT upstream.
      - name: JFrog IAP setup (WIF + local proxy, API only)
        uses: ./.github/actions/jfrog-iap-setup
        with:
          iap_enabled: ${{ vars.IAP_USE_WIF }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          iap_oauth_client_id: ${{ vars.IAP_OAUTH_CLIENT_ID }}
          jf_host: ${{ vars.JF_HOST }}
          jf_host_cli: ${{ vars.JF_HOST_CLI }}
          proxy_port: "18081"
          with_docker: "false"
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          gcp_wif_service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
      - uses: jfrog/frogbot@v2
        env:
          JF_CLI_LOG_LEVEL: "DEBUG"
          # JF_URL: from job env; when IAP proxy runs, GITHUB_ENV set JF_URL to http://127.0.0.1:<port>/
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JF_DEPS_REPO: "dev-npm-unsecure-remote"
          JF_PULL_REQUEST_TITLE_TEMPLATE: "[🐸 Frogbot-Automatic PR] - Aggregated findings"
          JF_GIT_AGGREGATE_FIXES: "TRUE"
          JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"
          JF_FAIL: "FALSE"
