name: "gh-ejs-demo"
on: 
  schedule:
    - cron: "30 8 * * *"  
  workflow_dispatch:
permissions:
  # Required: explicit permissions default unlisted scopes to "none". SLSA generator needs OIDC.
  id-token: write
  contents: write
  # required for all workflows
  security-events: write
  actions: read 
  attestations: write    
  packages: write  
jobs:
  gh-ejs-demo:
    runs-on: ubuntu-latest
    env:
      DOCKER_REPO: 'dev-oci'
      IMAGE_NAME: 'ejs-demo:${{ github.run_number }}'
      # Public/browser hostname (IAP). WIF + curl ping this URL.
      JF_PUBLIC_URL: ${{ format('https://{0}/', vars.JF_HOST) }}
      # Registry + jf API: must allow Authorization: Bearer <JFrog token>. If Artifactory is behind IAP,
      # set vars.JF_HOST_CLI to another hostname for the same instance (internal LB, no IAP on that host).
      JF_REGISTRY_HOST: ${{ vars.JF_HOST_CLI != '' && vars.JF_HOST_CLI || vars.JF_HOST }}
      JF_URL: ${{ format('https://{0}/', vars.JF_HOST_CLI != '' && vars.JF_HOST_CLI || vars.JF_HOST) }}
      JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
    outputs:
      image: ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout the repository    
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud (WIF)
        id: gcp-auth
        if: vars.IAP_USE_WIF == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
      - name: Set up gcloud CLI
        if: vars.IAP_USE_WIF == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
      # WIF credentials are not a "classic" SA key; gcloud print-identity-token --audiences
      # rejects them ("Invalid account type"). Mint the IAP ID token via IAM Credentials API instead.
      # Name must NOT contain "token": jfrog/setup-jfrog-cli sets JFROG_CLI_ENV_EXCLUDE=*token* and
      # would strip IAP_ID_TOKEN from the job environment.
      - name: Issue Google ID token for IAP audience
        if: vars.IAP_USE_WIF == 'true'
        env:
          IAP_OAUTH_CLIENT_ID: ${{ vars.IAP_OAUTH_CLIENT_ID }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, subprocess, urllib.error, urllib.request
          from urllib.parse import quote

          sa = os.environ["GCP_WIF_SERVICE_ACCOUNT"].strip()
          aud = os.environ["IAP_OAUTH_CLIENT_ID"].strip()
          access = subprocess.check_output(
              ["gcloud", "auth", "print-access-token"], text=True
          ).strip()
          # Literal ":generateIdToken" in path; only encode the SA email (curl URL parsing was brittle).
          url = (
              "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/"
              + quote(sa, safe="")
              + ":generateIdToken"
          )
          body = json.dumps({"audience": aud, "includeEmail": True}).encode()
          req = urllib.request.Request(url, data=body, method="POST")
          req.add_header("Authorization", f"Bearer {access}")
          req.add_header("Content-Type", "application/json")
          try:
              with urllib.request.urlopen(req) as resp:
                  out = json.load(resp)
          except urllib.error.HTTPError as e:
              raise SystemExit(f"generateIdToken failed HTTP {e.code}: {e.read().decode()}")
          jwt = out.get("token")
          if not jwt:
              raise SystemExit(f"no token in response: {out}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as gh:
              gh.write(f"IAP_GOOGLE_JWT={jwt}\n")
          print("::add-mask::" + jwt)
          PY
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
            node-version: 24 
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        env:
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      # IAP validates Authorization as a Google ID token. jf sends JF_ACCESS_TOKEN (JFrog) in the same
      # header — the LB often rejects it with "JWT signature is invalid" before Artifactory runs.
      # Use curl+IAP_GOOGLE_JWT to test IAP; jf may need a non-IAP hostname or platform change.
      - name: Verify JFrog connection and visible repositories
        env:
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_HAVE_CLI_HOST: ${{ vars.JF_HOST_CLI != '' }}
        run: |
          set -euo pipefail
          echo "JF_PUBLIC_URL (IAP / browser): ${JF_PUBLIC_URL}"
          echo "JF_URL (jf + registry): ${JF_URL}"
          if [ -n "${IAP_GOOGLE_JWT:-}" ]; then
            echo "--- IAP: ping on JF_PUBLIC_URL (Google ID token only) ---"
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${IAP_GOOGLE_JWT}" \
              "${JF_PUBLIC_URL}artifactory/api/system/ping" || echo "000")
            echo "ping HTTP ${code} (expect 2xx when IAP allows this SA)"
            if [ "${JF_HAVE_CLI_HOST}" != "true" ]; then
              echo "::error::Platform access tokens must use Authorization: Bearer (JFrog), which IAP cannot combine with a Google JWT on the same host. Set repository variable JF_HOST_CLI to a hostname for the same Artifactory that is not behind IAP (internal LB, split DNS, etc.). JF_URL then points there for jf; JF_PUBLIC_URL stays on vars.JF_HOST for IAP checks. See docs/github-actions-jfrog-iap.md"
              exit 1
            fi
            echo "--- Repositories: jf (Bearer JFrog only) on JF_URL — requires JF_HOST_CLI when IAP protects JF_HOST ---"
            jf rt ping
            if ! jf rt curl -sS "/artifactory/api/repositories" -o repos.json; then
              echo "::error::Could not list repositories — check JF_HOST_CLI, token scope, or Project access."
              exit 1
            fi
          else
            echo "IAP WIF disabled (set vars.IAP_USE_WIF=true after Phase 2). See docs/iap-wif-github-runbook.md"
            echo "--- jf rt ping (JF_ACCESS_TOKEN) ---"
            jf rt ping
            echo "--- Repositories this token can see (npm-related keys) ---"
            if ! jf rt curl -sS "/artifactory/api/repositories" -o repos.json; then
              echo "::error::Could not call Artifactory API — wrong JF_URL, network, token, or IAP still blocking jf."
              exit 1
            fi
          fi
          ruby -rjson -e 'raw=File.read("repos.json"); j=JSON.parse(raw); k=j.map{|r| r["key"]}; puts k.grep(/npm/i).sort; puts "---"; ok=k.include?("dev-npm"); puts "Contains dev-npm: #{ok}"; warn "::warning::API list has no dev-npm — check vars.JF_HOST / JF_HOST_CLI, token scope, and Project access." unless ok'
      - name: NPM Audit 
        run: |
          jf rt bce 
          jf rt bag
          jf npmc --repo-resolve dev-npm
          jf ca
          jf npm cache clean --force
          rm package-lock.json
          jf npmc --repo-resolve dev-npm-unsecure-remote
          jf npm i --omit dev 
          jf audit --npm --fail=false
      
      - name: Authenticate Docker
        run: jf docker login ${{ env.JF_REGISTRY_HOST }}
      # docker image build
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        id: build
        with:
          push: true
          provenance: true
          platforms: linux/amd64 #, linux/arm64
          tags: ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
      - name: Publish build information
        id: publish-build
        run: |
          echo "${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" > metadata.json
          jf rt build-docker-create ${{ env.DOCKER_REPO }} --image-file metadata.json
          jf rt bp
      # docker xray scanning
      - name: docker Info
        id: docker-info
        run: |  
          echo "digest=$(docker images --no-trunc --quiet ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }})" >> $GITHUB_OUTPUT
          jf docker pull ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
          jf docker scan --fail=false  --threads=5 ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }} --severity='HIGH,CRITICAL' --vuln --format=sarif > jfrog_docker_scan.sarif
          sed -i s/"\"uri\": \"\""/"\"uri\": \"https:\/\/${{ env.JF_REGISTRY_HOST }}\/${{ env.DOCKER_REPO }}\/${{ env.IMAGE_NAME }}:${{ github.run_number }}\""/g jfrog_docker_scan.sarif
        # adding the built docker into the JFrog build info     
      - name: Upload output to generate autofix
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: jfrog_docker_scan.sarif
      - name: Scan build
        id: scan-build  
        run: |
           jf build-scan --fail=false 
           jf build-scan --fail=false --vuln
      - name: Create test evidence
        id: create-evd  
        run: |
          jf evd create --predicate=api_test_run.json --predicate-type=https://jfrog.com/evidence/test-results/v1 \
          --package-name ejs-demo --package-version ${{ github.run_number }} --package-repo-name dev-oci \
          --key private.pem --key-alias ejs-frog-demo --markdown test-results.md --project=${{ vars.JF_PROJECT_KEY }}
      - name: Sign build evidence
        run: |
          echo '🔎 Evidence attached: `build-signature` 🔏 ' >> $GITHUB_STEP_SUMMARY
          echo '{ "build-actor": "${{ github.actor }}", "date": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'" }' > build-sign.json
          jf evd create --build-name ${{ github.workflow }} --build-number ${{ github.run_number }} \
            --predicate ./build-sign.json --predicate-type https://jfrog.com/evidence/build-signature/v1 \
            --key private.pem  --key-alias ejs-frog-demo --project=${{ vars.JF_PROJECT_KEY }} --markdown build-summary.md
          
      - name: Create release-bundle and add evidence
        id: create-bundle  
        run: |
           jf rbc --spec=./simple-bundle-specs.json RlmEjsDemo 1.${{ github.run_number }}.0 --sync=true --signing-key Distribute
           jf evd create --predicate ./feature.json --predicate-type=https://jfrog.com/evidence/test-results/v1 \
           --release-bundle RlmEjsDemo  --release-bundle-version 1.${{ github.run_number }}.0 \
           --key private.pem  --key-alias ejs-frog-demo --project=${{ vars.JF_PROJECT_KEY }} --markdown feature-flags.md
  provenance:
        needs: [gh-ejs-demo]
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
        with:
          image:  ${{ needs.gh-ejs-demo.outputs.image }}
          digest: ${{ needs.gh-ejs-demo.outputs.digest }}
          private-repository: true          
        secrets:
          registry-username: ${{ secrets.PROVENANCE_LOGIN }}
          registry-password: ${{ secrets.PROVENANCE_PWD }}
        
