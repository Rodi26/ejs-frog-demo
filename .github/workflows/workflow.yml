name: "gh-ejs-demo"
on: 
  schedule:
    - cron: "30 8 * * *"  
  workflow_dispatch:
    inputs:
      environment:
        description: "Optional GitHub Environment name (Environment-scoped vars/secrets). See docs/github-actions-jfrog-iap.md — add job-level environment: to use."
        required: false
        type: string
# One run per branch at a time: parallel gh-ejs-demo runs all hit the same JFrog+IAP proxy and look "stuck" for 10–20+ min on npm.
concurrency:
  group: gh-ejs-demo-${{ github.ref }}
  cancel-in-progress: false
permissions:
  # Required: explicit permissions default unlisted scopes to "none". SLSA generator needs OIDC.
  id-token: write
  contents: write
  # required for all workflows
  security-events: write
  actions: read 
  attestations: write    
  packages: write  
jobs:
  gh-ejs-demo:
    runs-on: ubuntu-latest
    # Optional: tie this job to a GitHub Environment (e.g. after adding workflow_dispatch.inputs.environment).
    # environment: ${{ github.event.inputs.environment }}
    env:
      DOCKER_REPO: 'dev-oci'
      IMAGE_NAME: 'ejs-demo:${{ github.run_number }}'
      # Public/browser hostname (IAP). WIF + curl ping this URL.
      JF_PUBLIC_HOST: ${{ vars.JF_HOST }}
      JF_PUBLIC_URL: ${{ format('https://{0}/', vars.JF_HOST) }}
      # Default: same host for registry/jf. Overridden by GITHUB_ENV when using local IAP proxy or JF_HOST_CLI.
      JF_REGISTRY_HOST: ${{ vars.JF_HOST_CLI != '' && vars.JF_HOST_CLI || vars.JF_HOST }}
      JF_URL: ${{ format('https://{0}/', vars.JF_HOST_CLI != '' && vars.JF_HOST_CLI || vars.JF_HOST) }}
      JF_IAP_PROXY_MODE: "false"
      JF_IAP_PROXY_PORT: "18081"
      JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
    outputs:
      image: ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
      digest: ${{ steps.build.outputs.digest }}
      skip_provenance: ${{ steps.job-flags.outputs.skip_provenance }}
    steps:
      - name: Checkout the repository    
        uses: actions/checkout@v4
      # WIF: mint IAP JWT via IAM Credentials (not gcloud identity-token). Env name IAP_GOOGLE_JWT — not *token* — or setup-jfrog-cli strips it.
      # IAP + local forwarder: docs/github-actions-jfrog-iap.md
      - name: JFrog IAP setup (WIF + local proxy)
        uses: ./.github/actions/jfrog-iap-setup
        with:
          iap_enabled: ${{ vars.IAP_USE_WIF }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          iap_oauth_client_id: ${{ vars.IAP_OAUTH_CLIENT_ID }}
          jf_host: ${{ vars.JF_HOST }}
          jf_host_cli: ${{ vars.JF_HOST_CLI }}
          proxy_port: "18081"
          with_docker: "true"
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          gcp_wif_service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # docker-container BuildKit cannot reach the host IAP proxy at 127.0.0.1 — use host networking.
          driver-opts: network=host
      - name: Install Node
        uses: actions/setup-node@v4
        with:
            node-version: 24 
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        env:
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      # IAP can accept the Google OIDC JWT in Proxy-Authorization so Authorization stays Bearer <JFrog>.
      # curl validates both headers on JF_PUBLIC_URL; jf uses JF_URL (local proxy or JF_HOST_CLI). See docs/github-actions-jfrog-iap.md
      - name: Verify JFrog connection and visible repositories
        env:
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_HAVE_CLI_HOST: ${{ vars.JF_HOST_CLI != '' }}
        run: |
          set -euo pipefail
          echo "JF_PUBLIC_HOST / JF_PUBLIC_URL (IAP / browser): ${JF_PUBLIC_HOST} → ${JF_PUBLIC_URL}"
          echo "JF_REGISTRY_HOST / JF_URL (jf + Docker): ${JF_REGISTRY_HOST} → ${JF_URL}"
          echo "JF_IAP_PROXY_MODE=${JF_IAP_PROXY_MODE:-false}"
          echo "Repository variables: JF_HOST='${{ vars.JF_HOST }}' JF_HOST_CLI='${{ vars.JF_HOST_CLI }}' (optional second hostname; see docs)"
          if [ -n "${IAP_GOOGLE_JWT:-}" ]; then
            echo "--- IAP: curl two-header test on JF_PUBLIC_URL (Proxy-Authorization + Authorization) ---"
            code_ping=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Proxy-Authorization: Bearer ${IAP_GOOGLE_JWT}" \
              -H "Authorization: Bearer ${JF_ACCESS_TOKEN}" \
              "${JF_PUBLIC_URL}artifactory/api/system/ping" || echo "000")
            echo "ping HTTP ${code_ping} (expect 2xx when IAP allows this SA)"
            code_repos=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Proxy-Authorization: Bearer ${IAP_GOOGLE_JWT}" \
              -H "Authorization: Bearer ${JF_ACCESS_TOKEN}" \
              "${JF_PUBLIC_URL}artifactory/api/repositories" || echo "000")
            echo "repositories HTTP ${code_repos}"
            if [ "${JF_IAP_PROXY_MODE:-false}" = "true" ]; then
              echo "--- jf via local IAP forward proxy (localhost) ---"
              jf rt ping
              if ! jf rt curl -sS "/artifactory/api/repositories" -o repos.json; then
                echo "::error::Could not list repositories — check token scope, Project access, or /tmp/iap-jf-proxy.log on the runner."
                exit 1
              fi
            elif [ "${JF_HAVE_CLI_HOST}" = "true" ]; then
              if [ "${JF_REGISTRY_HOST}" = "${JF_PUBLIC_HOST}" ]; then
                echo "::error::JF_HOST_CLI must not equal JF_HOST (both are '${JF_REGISTRY_HOST}')."
                exit 1
              fi
              echo "--- Repositories: jf on JF_URL (JF_HOST_CLI path) ---"
              jf rt ping
              if ! jf rt curl -sS "/artifactory/api/repositories" -o repos.json; then
                echo "::error::Could not list repositories — check JF_HOST_CLI, token scope, or Project access."
                exit 1
              fi
            else
              echo "::error::IAP is enabled but neither the local IAP proxy nor JF_HOST_CLI is active. For a single public hostname, clear JF_HOST_CLI so the workflow starts the forward proxy, or set JF_HOST_CLI to a second hostname. See docs/github-actions-jfrog-iap.md"
              exit 1
            fi
          else
            echo "IAP WIF disabled (set vars.IAP_USE_WIF=true after Phase 2). See docs/iap-wif-github-runbook.md"
            echo "--- jf rt ping (JF_ACCESS_TOKEN) ---"
            jf rt ping
            echo "--- Repositories this token can see (npm-related keys) ---"
            if ! jf rt curl -sS "/artifactory/api/repositories" -o repos.json; then
              echo "::error::Could not call Artifactory API — wrong JF_URL, network, token, or IAP still blocking jf."
              exit 1
            fi
          fi
          ruby -rjson <<'RUBY'
          j = JSON.parse(File.read("repos.json"))
          list =
            case j
            when Array then j
            when Hash
              j["repositories"] || j["data"] || j.values.find { |v| v.is_a?(Array) } || []
            else
              []
            end
          k = list.filter_map do |r|
            case r
            when Hash then r["key"]
            when String then r
            end
          end
          puts k.grep(/npm/i).sort
          puts "---"
          ok = k.include?("dev-npm")
          puts "Contains dev-npm: #{ok}"
          warn "::warning::API list has no dev-npm — check vars.JF_HOST / JF_HOST_CLI, token scope, and Project access." unless ok
          RUBY
      - name: NPM Audit 
        timeout-minutes: 60
        run: |
          set -euo pipefail
          echo "NPM via JFrog: install uses committed package-lock.json (jf npm ci) — much faster than deleting the lock and jf npm i."
          # jf npmc / jf ca have limited internal HTTP retries; transient 502 via IAP proxy → retry whole command with backoff.
          retry_with_backoff() {
            local max=5 n=1 wait=15
            while [ "$n" -le "$max" ]; do
              if "$@"; then
                return 0
              fi
              if [ "$n" -eq "$max" ]; then
                echo "::error::Failed after ${max} attempts: $*"
                return 1
              fi
              echo "::warning::Attempt ${n} failed for: $* — sleeping ${wait}s before retry..."
              sleep "$wait"
              n=$((n + 1))
              wait=$((wait + 15))
            done
          }
          jf rt bce 
          jf rt bag
          retry_with_backoff jf npmc --repo-resolve dev-npm
          # --threads 1 reduces parallel HEADs against the local IAP forwarder (502 under default concurrency).
          retry_with_backoff jf ca --threads 1
          retry_with_backoff jf npmc --repo-resolve dev-npm-unsecure-remote
          # npm ci follows package-lock "resolved" URLs verbatim. If they point at the IAP
          # hostname, npm would fetch without Proxy-Authorization → HTML/error bytes → tar corruption.
          if [ "${JF_IAP_PROXY_MODE:-false}" = "true" ]; then
            echo "Rewriting package-lock.json resolved URLs to local IAP forward proxy (${JF_REGISTRY_HOST})."
            ruby -e '
              lock = File.read("package-lock.json", encoding: "UTF-8")
              pub = ENV.fetch("JF_PUBLIC_HOST").strip
              reg = ENV.fetch("JF_REGISTRY_HOST").strip
              old = "https://" + pub
              new = "http://" + reg
              n = lock.split(old).size - 1
              if n == 0
                warn "::warning::No #{old} in package-lock.json — tarball fetches may still bypass the proxy."
              else
                File.write("package-lock.json", lock.gsub(old, new), encoding: "UTF-8")
                puts "Rewrote #{n} URL prefix(es): #{old} → #{new}"
              end
            '
          fi
          export NPM_CONFIG_FETCH_RETRIES=10
          export NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=30000
          export NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=120000
          export NPM_CONFIG_FETCH_TIMEOUT=600000
          jf npm ci --omit dev
          jf audit --npm --fail=false
      
      - name: Authenticate Docker
        env:
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${JF_IAP_PROXY_MODE:-false}" = "true" ]; then
            # docker login probes /v2/ and may follow OAuth realm URLs on the public IAP host (HTML, not JSON).
            # ~/.docker/config.json with Basic "auth" avoids that Bearer round-trip for push/pull via the proxy.
            U="${{ vars.JF_DOCKER_USERNAME }}"
            if [ -z "${U}" ]; then
              U=$(jf rt curl -sS "/artifactory/api/security/user" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('name') or d.get('email') or '')")
            fi
            if [ -z "${U}" ]; then
              echo "::error::Set Actions variable JF_DOCKER_USERNAME (Artifactory user), or ensure the token can call GET /artifactory/api/security/user."
              exit 1
            fi
            export DOCKER_USERNAME="$U"
            python3 -c 'import base64,json,os; from pathlib import Path; h=os.environ["JF_REGISTRY_HOST"].strip(); u=os.environ["DOCKER_USERNAME"].strip(); t=os.environ["JF_ACCESS_TOKEN"].strip(); b=base64.b64encode((u+":"+t).encode()).decode(); c={"auths":{h:{"auth":b},"http://"+h:{"auth":b}}}; Path.home().joinpath(".docker").mkdir(parents=True, exist_ok=True); Path.home().joinpath(".docker","config.json").write_text(json.dumps(c), encoding="utf-8"); print("Wrote ~/.docker/config.json with Basic auth for", h)'
          else
            jf docker login ${{ env.JF_REGISTRY_HOST }}
          fi
      # docker image build
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        id: build
        with:
          push: true
          provenance: true
          platforms: linux/amd64 #, linux/arm64
          tags: ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
      - name: Publish build information
        id: publish-build
        run: |
          echo "${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" > metadata.json
          jf rt build-docker-create ${{ env.DOCKER_REPO }} --image-file metadata.json
          jf rt bp
      # docker xray scanning
      - name: docker Info
        id: docker-info
        run: |  
          # buildx --push does not load the image into the local engine; use the digest from build-push-action.
          echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
          # Pull by digest so we resolve the same manifest buildx pushed (tag pull + jf docker pull were flaky with IAP proxy / jf login).
          FULL="${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}"
          DIG="${{ steps.build.outputs.digest }}"
          docker pull "${FULL%:*}@${DIG}"
          docker tag "${FULL%:*}@${DIG}" "${FULL}"
          jf docker scan --fail=false  --threads=5 ${{ env.JF_REGISTRY_HOST }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }} --severity='HIGH,CRITICAL' --vuln --format=sarif > jfrog_docker_scan.sarif
          SCHEME=https
          if [ "${JF_IAP_PROXY_MODE:-false}" = "true" ]; then SCHEME=http; fi
          # IMAGE_NAME already includes :<run_number> — do not append github.run_number again (would yield ejs-demo:163:163).
          sed -i s/"\"uri\": \"\""/"\"uri\": \"${SCHEME}:\/\/${{ env.JF_REGISTRY_HOST }}\/${{ env.DOCKER_REPO }}\/${{ env.IMAGE_NAME }}\""/g jfrog_docker_scan.sarif
        # adding the built docker into the JFrog build info     
      - name: Upload output to generate autofix
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: jfrog_docker_scan.sarif
      - name: Scan build
        id: scan-build  
        run: |
           jf build-scan --fail=false 
           jf build-scan --fail=false --vuln
      - name: Create test evidence
        id: create-evd  
        run: |
          jf evd create --predicate=api_test_run.json --predicate-type=https://jfrog.com/evidence/test-results/v1 \
          --package-name ejs-demo --package-version ${{ github.run_number }} --package-repo-name dev-oci \
          --key private.pem --key-alias ejs-frog-demo --markdown test-results.md --project=${{ vars.JF_PROJECT_KEY }}
      - name: Sign build evidence
        run: |
          echo '🔎 Evidence attached: `build-signature` 🔏 ' >> $GITHUB_STEP_SUMMARY
          echo '{ "build-actor": "${{ github.actor }}", "date": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'" }' > build-sign.json
          jf evd create --build-name ${{ github.workflow }} --build-number ${{ github.run_number }} \
            --predicate ./build-sign.json --predicate-type https://jfrog.com/evidence/build-signature/v1 \
            --key private.pem  --key-alias ejs-frog-demo --project=${{ vars.JF_PROJECT_KEY }} --markdown build-summary.md
          
      - name: Create release-bundle and add evidence
        id: create-bundle  
        run: |
           jf rbc --spec=./simple-bundle-specs.json RlmEjsDemo 1.${{ github.run_number }}.0 --sync=true --signing-key Distribute
           jf evd create --predicate ./feature.json --predicate-type=https://jfrog.com/evidence/test-results/v1 \
           --release-bundle RlmEjsDemo  --release-bundle-version 1.${{ github.run_number }}.0 \
           --key private.pem  --key-alias ejs-frog-demo --project=${{ vars.JF_PROJECT_KEY }} --markdown feature-flags.md
      # SLSA provenance job pulls by image reference from another runner; localhost registry is not reachable there.
      - name: Export job flags (SLSA provenance)
        id: job-flags
        if: success()
        run: |
          if [ "${JF_IAP_PROXY_MODE:-false}" = "true" ]; then
            echo "skip_provenance=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip_provenance=false" >> "${GITHUB_OUTPUT}"
          fi
  provenance:
        needs: [gh-ejs-demo]
        if: ${{ needs.gh-ejs-demo.outputs.skip_provenance != 'true' }}
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
        with:
          image:  ${{ needs.gh-ejs-demo.outputs.image }}
          digest: ${{ needs.gh-ejs-demo.outputs.digest }}
          private-repository: true          
        secrets:
          registry-username: ${{ secrets.PROVENANCE_LOGIN }}
          registry-password: ${{ secrets.PROVENANCE_PWD }}
        
