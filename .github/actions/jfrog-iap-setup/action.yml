name: JFrog IAP setup (WIF)
description: >
  Google WIF auth, gcloud, mint IAP Google JWT, and configure JF_URL via JF_HOST_CLI or local IAP forward proxy.
inputs:
  iap_enabled:
    description: "Enable IAP path (e.g. vars.IAP_USE_WIF == 'true')"
    required: true
  gcp_project_id:
    description: GCP project id (vars.GCP_PROJECT_ID)
    required: true
  iap_oauth_client_id:
    description: IAP OAuth client id audience (vars.IAP_OAUTH_CLIENT_ID)
    required: true
  jf_host:
    description: Public JFrog / IAP hostname (vars.JF_HOST)
    required: true
  jf_host_cli:
    description: Optional split-DNS hostname for jf (vars.JF_HOST_CLI)
    required: false
    default: ""
  proxy_port:
    description: Local IAP forward proxy port
    required: false
    default: "18081"
  with_docker:
    description: "Configure Docker daemon + JF_REGISTRY_HOST for local proxy (main pipeline). Use false for API-only (Frogbot)."
    required: false
    default: "false"
  workload_identity_provider:
    description: WIF provider (secrets.WORKLOAD_IDENTITY_PROVIDER)
    required: true
  gcp_wif_service_account:
    description: WIF service account email (secrets.GCP_WIF_SERVICE_ACCOUNT)
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud (WIF)
      if: inputs.iap_enabled == 'true'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.gcp_wif_service_account }}

    - name: Set up gcloud CLI
      if: inputs.iap_enabled == 'true'
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ inputs.gcp_project_id }}

    - name: Issue Google ID token for IAP audience
      if: inputs.iap_enabled == 'true'
      shell: bash
      env:
        IAP_OAUTH_CLIENT_ID: ${{ inputs.iap_oauth_client_id }}
        GCP_WIF_SERVICE_ACCOUNT: ${{ inputs.gcp_wif_service_account }}
      run: python3 "${GITHUB_WORKSPACE}/scripts/mint-iap-google-jwt.py"

    - name: Configure JFrog URL for IAP (proxy or JF_HOST_CLI)
      if: inputs.iap_enabled == 'true'
      shell: bash
      env:
        JF_HOST: ${{ inputs.jf_host }}
        JF_HOST_CLI: ${{ inputs.jf_host_cli }}
        JF_IAP_PROXY_PORT: ${{ inputs.proxy_port }}
        WITH_DOCKER: ${{ inputs.with_docker }}
      run: bash "${GITHUB_WORKSPACE}/scripts/configure-jfrog-iap-proxy.sh"
